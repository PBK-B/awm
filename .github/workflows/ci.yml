name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - "1.22.x"
          - "stable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify formatting
        if: runner.os != 'Windows'
        run: |
          gofmt -w $(git ls-files '*.go')
          git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o awm ./cmd/awm
